# Railway: set root to this repo, add DATABASE_URL + env vars in dashboard.
[build]
builder = "NIXPACKS"
buildCommand = "npm install && npm run db:generate --workspace=@ai-cambridge-school/database && npm run api:build"

[deploy]
startCommand = "npm run api:start --workspace=api"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
